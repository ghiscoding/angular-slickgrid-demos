<div id="demo-container" class="container-fluid">
  <h2>
    Example 12: Localization (i18n)
<span class="float-end">
      <a
        style="font-size: 18px"
        target="_blank"
        href="https://github.com/ghiscoding/angular-slickgrid-demos/tree/master/standalone-single-locale/src/app/examples/example02.component.ts"
      >
        <span class="mdi mdi-link-variant"></span> code
      </a>
    </span>
    <button class="ms-2 btn btn-outline-secondary btn-sm btn-icon" type="button" data-test="toggle-subtitle" (click)="toggleSubTitle()">
      <span class="mdi mdi-information-outline" title="Toggle example sub-title details"></span>
    </button>
  </h2>

<div class="subtitle">
    This Examples uses French Locales but you could use your own custom locales
    <ul>
      <li>Defining your own Custom Locales must include all necessary text, see the docs (<a href="https://ghiscoding.gitbook.io/angular-slickgrid/localization/localization-with-custom-locales" target="_blank">with Custom Locales</a>)</li>
    </ul>
  </div>

  <hr />

  <div class="row">
    <div class="col-sm-12">
      <span style="margin-left: 20px">
        <button class="btn btn-outline-secondary btn-sm btn-icon" (click)="exportToFile('csv')">
          <i class="mdi mdi-download"></i>
          Download to CSV
        </button>
        <button class="btn btn-outline-secondary btn-sm btn-icon" (click)="exportToFile('txt')">
          <i class="mdi mdi-download"></i>
          Download to Text
        </button>
        <button class="btn btn-outline-secondary btn-sm btn-icon" (click)="exportToExcel()">
          <i class="mdi mdi-file-excel-outline text-success"></i>
          Download to Excel
        </button>
        <button class="btn btn-outline-secondary btn-sm btn-icon" (click)="dynamicallyAddTitleHeader()">
          <i class="mdi mdi-shape-square-plus"></i>
          Dynamically Duplicate Title Column
        </button>
      </span>
    </div>
  </div>

  <div class="col-sm-12">
    <angular-slickgrid
      gridId="grid12"
      [dataset]="dataset"
      [options]="gridOptions"
      [columns]="columnDefinitions"
      (onAngularGridCreated)="angularGridReady($event.detail)"
      (onGridStateChanged)="gridStateChanged($event.detail)"
    >
    </angular-slickgrid>
  </div>
</div>
